default_language_version:
  python: python3

ci:
  autofix_prs: true
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit suggestions"
  autoupdate_schedule: quarterly
  # submodules: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-case-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
        # empty to do not write fixes
        args: []

  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.8
    hooks:
      - id: docformatter
        additional_dependencies: [tomli]
        args: ["--in-place"]
        # docformatter v1.7.8 disagrees with ruff-format on these files
        # (blank lines after docstring-only function bodies, blank lines
        # between module docstring and first class, and a multi-line
        # string literal used as an `exec()` argument that docformatter
        # incorrectly treats as a docstring). Exclude until upstream
        # reconciles the conventions or the patterns are restructured.
        exclude: |
          (?x)^(
            src/cachier/exporters/prometheus\.py|
            tests/mongo_tests/clients\.py|
            tests/test_varargs\.py
          )$

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff
          - mdformat_frontmatter
        args: ["--number"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(json|yml|yaml|toml)
        # https://prettier.io/docs/en/options.html#print-width
        args: ["--print-width=79"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # use black formatting
      - id: ruff-format
        name: Black by Ruff
      # basic check
      - id: ruff-check
        name: Ruff check
        args: ["--fix"] #, "--unsafe-fixes"

  # it needs to be after formatting hooks because the lines might be changed
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: "src/.*"

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.25.1
    hooks:
      - id: pyproject-fmt
        additional_dependencies: [tox]
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
